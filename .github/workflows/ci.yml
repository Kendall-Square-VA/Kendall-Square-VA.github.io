name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  content-lint:
    name: content-lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Validate post front matter
        run: ruby scripts/validate_posts.rb

  link-check:
    name: link-check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Build site
        run: bundle exec jekyll build

      - name: Check generated links
        run: bundle exec htmlproofer ./_site --checks Links --disable-external --allow-hash-href --allow-missing-href --no-enforce-https

  build-and-audit:
    name: build-and-audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Build site
        run: bundle exec jekyll build

      - name: Install bundler-audit
        run: gem install bundler-audit --no-document

      - name: Security audit
        run: |
          bundler-audit update
          bundler-audit check .

  smoke-e2e:
    name: smoke-e2e
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Build site
        run: bundle exec jekyll build

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Playwright browser
        run: npx --yes playwright@1.54.2 install --with-deps chromium

      - name: Run smoke tests
        run: |
          python3 -m http.server 4000 --directory _site >/tmp/http-server.log 2>&1 &
          SERVER_PID=$!
          trap 'kill "$SERVER_PID"' EXIT

          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:4000 >/dev/null; then
              break
            fi
            sleep 1
          done

          BASE_URL=http://127.0.0.1:4000 npx --yes playwright@1.54.2 test tests/smoke.spec.js --reporter=line --workers=1
