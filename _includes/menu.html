<nav class="site-nav" aria-label="Main navigation">
    <div class="nav-inner">
        <button class="nav-toggle" aria-expanded="false" aria-controls="nav-menu" aria-label="Toggle navigation">
            <span></span><span></span><span></span>
        </button>
        <ul id="nav-menu" class="nav-menu">
            <li><a href="/" {% if page.url == "/" %}class="active"{% endif %}>Home</a></li>
            <li><a href="/location" {% if page.url contains "location" %}class="active"{% endif %}>Location</a></li>
            <li><a href="/updates" {% if page.url contains "updates" %}class="active"{% endif %}>Updates</a></li>
            <li><a href="/hoa" {% if page.url contains "hoa" %}class="active"{% endif %}>HOA</a></li>
            <li><a href="/forum" {% if page.url contains "forum" %}class="active"{% endif %}>Forums</a></li>
            <li><a href="/calendar" {% if page.url contains "calendar" %}class="active"{% endif %}>Calendar</a></li>
        </ul>
    </div>
</nav>
<script>
(function() {
    var toggle = document.querySelector('.nav-toggle');
    var menu = document.getElementById('nav-menu');
    if (toggle && menu) {
        toggle.addEventListener('click', function() {
            var expanded = toggle.getAttribute('aria-expanded') === 'true';
            toggle.setAttribute('aria-expanded', String(!expanded));
            menu.classList.toggle('is-open');
        });
    }
})();
</script>
